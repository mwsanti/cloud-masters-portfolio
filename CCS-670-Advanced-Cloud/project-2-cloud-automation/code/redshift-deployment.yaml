AWSTemplateFormatVersion: '2010-09-09'
Description: CloudFormation template to deploy an Amazon Redshift cluster with prerequisites, IAM role, and S3 data loading capabilities for CCS670RedshiftUser

Parameters:
  MasterUsername:
    Type: String
    Description: The username for the master user account for the Redshift cluster
    Default: awsuser
    MinLength: 1
    MaxLength: 64
    AllowedPattern: '[a-z][a-z0-9]*'
    ConstraintDescription: Must be 1-64 lowercase alphanumeric characters, starting with a letter
  MasterUserPassword:
    Type: String
    Description: The password for the master user account (must be 8-64 alphanumeric characters, e.g., Password123456, provided at stack creation)
    NoEcho: true
    MinLength: 8
    MaxLength: 64
    AllowedPattern: '[a-zA-Z0-9]*'
    ConstraintDescription: Must be 8-64 alphanumeric characters
  DatabaseName:
    Type: String
    Description: The name of the first database to be created
    Default: dev
    MinLength: 1
    MaxLength: 64
    AllowedPattern: '[a-z][a-z0-9]*'
    ConstraintDescription: Must be 1-64 lowercase alphanumeric characters, starting with a letter
  PortNumber:
    Type: Number
    Description: The port number for the Redshift cluster
    Default: 5439
    MinValue: 1150
    MaxValue: 65535
  InboundCIDR:
    Type: String
    Description: CIDR range for inbound traffic to the Redshift cluster (e.g., your IP like 192.168.1.100/32 for security)
    Default: '0.0.0.0/0'
    AllowedPattern: '^([0-9]{1,3}\.){3}[0-9]{1,3}(/[0-9]{1,2})?$'
    ConstraintDescription: Must be a valid CIDR range
  EETeamUserName:
    Type: String
    Description: IAM user name for scheduling queries
    Default: 'CCS670RedshiftUser'
    AllowedPattern: '^[a-zA-Z0-9+=,.@_-]+$'
    ConstraintDescription: Must be a valid IAM user name containing only alphanumeric characters and/or +=,.@_- symbols

Resources:
  # Setting up VPC and networking prerequisites
  RedshiftVPC:
    Type: AWS::EC2::VPC
    Properties:
      CidrBlock: 10.0.0.0/16
      EnableDnsHostnames: true
      EnableDnsSupport: true
      Tags:
        - Key: Name
          Value: RedshiftVPC

  InternetGateway:
    Type: AWS::EC2::InternetGateway
    Properties:
      Tags:
        - Key: Name
          Value: RedshiftIGW

  AttachGateway:
    Type: AWS::EC2::VPCGatewayAttachment
    Properties:
      VpcId: !Ref RedshiftVPC
      InternetGatewayId: !Ref InternetGateway

  PublicSubnet1:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref RedshiftVPC
      CidrBlock: 10.0.1.0/24
      AvailabilityZone: !Select [0, !GetAZs '']
      Tags:
        - Key: Name
          Value: RedshiftPublicSubnet1

  PublicSubnet2:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref RedshiftVPC
      CidrBlock: 10.0.2.0/24
      AvailabilityZone: !Select [1, !GetAZs '']
      Tags:
        - Key: Name
          Value: RedshiftPublicSubnet2

  RouteTable:
    Type: AWS::EC2::RouteTable
    Properties:
      VpcId: !Ref RedshiftVPC
      Tags:
        - Key: Name
          Value: RedshiftRouteTable

  RouteToInternet:
    Type: AWS::EC2::Route
    Properties:
      RouteTableId: !Ref RouteTable
      DestinationCidrBlock: 0.0.0.0/0
      GatewayId: !Ref InternetGateway

  SubnetRouteTableAssociation1:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId: !Ref PublicSubnet1
      RouteTableId: !Ref RouteTable

  SubnetRouteTableAssociation2:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId: !Ref PublicSubnet2
      RouteTableId: !Ref RouteTable

  # Security Group for Redshift cluster
  RedshiftSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Security group for Redshift cluster
      VpcId: !Ref RedshiftVPC
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: !Ref PortNumber
          ToPort: !Ref PortNumber
          CidrIp: !Ref InboundCIDR

  # IAM Role for Redshift
  RedshiftRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: redshift.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: RedshiftS3Access
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - s3:GetObject
                  - s3:ListBucket
                Resource:
                  - arn:aws:s3:::redshift-immersionday-labs/*
                  - arn:aws:s3:::redshift-immersionday-labs
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/AmazonRedshiftAllCommandsFullAccess

  # Redshift Cluster
  RedshiftCluster:
    Type: AWS::Redshift::Cluster
    Properties:
      ClusterType: multi-node
      NumberOfNodes: 2
      NodeType: ra3.xlplus
      DBName: !Ref DatabaseName
      MasterUsername: !Ref MasterUsername
      MasterUserPassword: !Ref MasterUserPassword
      Port: !Ref PortNumber
      IamRoles:
        - !GetAtt RedshiftRole.Arn
      VpcSecurityGroupIds:
        - !GetAtt RedshiftSecurityGroup.GroupId
      ClusterSubnetGroupName: !Ref RedshiftSubnetGroup
      PubliclyAccessible: true
      Tags:
        - Key: Name
          Value: ImmersionLab1Cluster

  RedshiftSubnetGroup:
    Type: AWS::Redshift::ClusterSubnetGroup
    Properties:
      Description: Subnet group for Redshift cluster
      SubnetIds:
        - !Ref PublicSubnet1
        - !Ref PublicSubnet2

  # IAM Policy for Query Scheduling
  QuerySchedulingPolicy:
    Type: AWS::IAM::Policy
    Properties:
      PolicyName: RedshiftQueryScheduling
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Action:
              - redshift:DescribeClusters
              - redshift-data:*
            Resource: !Sub arn:aws:redshift:${AWS::Region}:${AWS::AccountId}:cluster:${RedshiftCluster}
      Users:
        - !Ref EETeamUserName

Outputs:
  ClusterEndpoint:
    Description: The endpoint of the Redshift cluster
    Value: !GetAtt RedshiftCluster.Endpoint.Address
  ClusterPort:
    Description: The port of the Redshift cluster
    Value: !GetAtt RedshiftCluster.Endpoint.Port
  JdbcConnectionString:
    Description: JDBC connection string for the Redshift cluster
    Value: !Sub jdbc:redshift://${RedshiftCluster.Endpoint.Address}:${RedshiftCluster.Endpoint.Port}/${DatabaseName}
  RedshiftRoleArn:
    Description: ARN of the IAM role for Redshift
    Value: !GetAtt RedshiftRole.Arn